<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1b26">
  <title>Copilot CLI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1b26;
      --bg-light: #24283b;
      --fg: #c0caf5;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --danger: #f7768e;
      --success: #9ece6a;
      --border: #3b4261;
      --quick-key-bg: #2f3549;
      --quick-key-hover: #3d4560;
      --radius: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ===== LOGIN ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .login-card .subtitle {
      font-size: 0.85rem;
      color: #565f89;
      margin-bottom: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--fg);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: var(--accent);
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #1a1b26;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover { background: var(--accent-hover); }
    .login-card button:active { transform: scale(0.98); }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }

    /* ===== TERMINAL ===== */
    #terminal-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-light);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 44px;
    }

    #header .title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent);
    }

    #header .status {
      font-size: 0.75rem;
      color: var(--success);
    }

    #header .status.disconnected { color: var(--danger); }

    .header-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .header-btn:hover { background: var(--quick-key-hover); }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #terminal-container .xterm {
      height: 100%;
      padding: 4px;
    }

    /* ===== QUICK KEYS ===== */
    #quick-keys {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 6px 8px;
      padding-bottom: calc(6px + var(--safe-bottom));
      background: var(--bg-light);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #quick-keys::-webkit-scrollbar { display: none; }

    .qk {
      flex-shrink: 0;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--quick-key-bg);
      color: var(--fg);
      font-size: 13px;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
      transition: background 0.1s;
    }

    .qk:active { background: var(--accent); color: var(--bg); }
    .qk.mod { color: var(--accent); font-weight: 600; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .qk { padding: 8px 10px; font-size: 12px; }
      #header { padding: 6px 10px; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      #header { padding: 4px 10px; min-height: 36px; }
      #quick-keys { padding: 4px 6px; }
      .qk { padding: 6px 8px; font-size: 11px; }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.85rem;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <h1>🤖 Copilot CLI</h1>
      <p class="subtitle">Terminale remoto sicuro</p>
      <form id="login-form">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" id="login-btn">Accedi</button>
      </form>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <!-- TERMINAL -->
  <div id="terminal-screen">
    <div id="header">
      <span class="title">🤖 Copilot CLI</span>
      <span id="status" class="status">● Connesso</span>
      <button class="header-btn" id="logout-btn" title="Logout">⏻</button>
    </div>
    <div id="terminal-container">
      <div id="terminal"></div>
    </div>
    <div id="quick-keys">
      <button class="qk" data-key="Tab">Tab</button>
      <button class="qk mod" data-seq="\x03">^C</button>
      <button class="qk mod" data-seq="\x04">^D</button>
      <button class="qk mod" data-seq="\x1a">^Z</button>
      <button class="qk mod" data-seq="\x0c">^L</button>
      <button class="qk" data-seq="\x1b[A">↑</button>
      <button class="qk" data-seq="\x1b[B">↓</button>
      <button class="qk" data-seq="\x1b[D">←</button>
      <button class="qk" data-seq="\x1b[C">→</button>
      <button class="qk" data-seq="\x1b">Esc</button>
      <button class="qk" data-char="|">|</button>
      <button class="qk" data-char="&">&amp;</button>
      <button class="qk" data-char=">">&gt;</button>
      <button class="qk" data-char="~">~</button>
      <button class="qk" data-char="/">/</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script>
    // --- State ---
    let token = sessionStorage.getItem('token');
    let ws = null;
    let term = null;
    let fitAddon = null;
    let reconnectTimer = null;

    // --- Utils ---
    function toast(msg, duration = 2000) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }

    function setStatus(connected) {
      const el = document.getElementById('status');
      el.textContent = connected ? '● Connesso' : '● Disconnesso';
      el.className = 'status' + (connected ? '' : ' disconnected');
    }

    // --- Login ---
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      const pw = document.getElementById('password').value;

      btn.disabled = true;
      errEl.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();

        if (res.ok) {
          token = data.token;
          sessionStorage.setItem('token', token);
          showTerminal();
        } else {
          errEl.textContent = data.error || 'Errore di login';
        }
      } catch (err) {
        errEl.textContent = 'Errore di connessione';
      } finally {
        btn.disabled = false;
      }
    });

    // --- Terminal ---
    function showTerminal() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('terminal-screen').style.display = 'flex';

      if (!term) {
        term = new Terminal({
          fontSize: 14,
          fontFamily: "'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace",
          theme: {
            background: '#1a1b26',
            foreground: '#c0caf5',
            cursor: '#c0caf5',
            cursorAccent: '#1a1b26',
            selectionBackground: '#33467c',
            black: '#15161e',
            red: '#f7768e',
            green: '#9ece6a',
            yellow: '#e0af68',
            blue: '#7aa2f7',
            magenta: '#bb9af7',
            cyan: '#7dcfff',
            white: '#a9b1d6',
            brightBlack: '#414868',
            brightRed: '#f7768e',
            brightGreen: '#9ece6a',
            brightYellow: '#e0af68',
            brightBlue: '#7aa2f7',
            brightMagenta: '#bb9af7',
            brightCyan: '#7dcfff',
            brightWhite: '#c0caf5',
          },
          cursorBlink: true,
          allowTransparency: false,
          scrollback: 5000,
          convertEol: true,
        });

        fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        term.onData(data => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

        term.onResize(({ cols, rows }) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'resize', cols, rows }));
          }
        });
      }

      connectWS();
      setupResize();
    }

    // --- WebSocket ---
    function connectWS() {
      if (ws) { try { ws.close(); } catch(e){} }

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws?token=${token}`);

      ws.onopen = () => {
        setStatus(true);
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        // Send initial size
        if (fitAddon) {
          fitAddon.fit();
          const dims = fitAddon.proposeDimensions();
          if (dims) {
            ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
          }
        }
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') term.write(msg.data);
          if (msg.type === 'exit') {
            toast('Sessione terminale chiusa');
            setStatus(false);
          }
          if (msg.type === 'error') toast(msg.data, 4000);
        } catch (err) { /* ignore */ }
      };

      ws.onclose = (e) => {
        setStatus(false);
        if (e.code === 4001) {
          // Unauthorized - go back to login
          sessionStorage.removeItem('token');
          token = null;
          document.getElementById('terminal-screen').style.display = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          toast('Sessione scaduta');
          return;
        }
        // Auto-reconnect
        reconnectTimer = setTimeout(() => connectWS(), 3000);
      };

      ws.onerror = () => setStatus(false);
    }

    // --- Resize ---
    function setupResize() {
      let resizeTimeout;
      const doResize = () => {
        if (fitAddon && term) {
          try { fitAddon.fit(); } catch(e){}
        }
      };

      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(doResize, 150);
      });

      // Handle virtual keyboard on mobile
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(doResize, 150);
        });
      }

      // Initial fit
      setTimeout(doResize, 100);
    }

    // --- Quick Keys ---
    document.getElementById('quick-keys').addEventListener('click', (e) => {
      const btn = e.target.closest('.qk');
      if (!btn || !ws || ws.readyState !== WebSocket.OPEN) return;

      if (btn.dataset.key === 'Tab') {
        ws.send(JSON.stringify({ type: 'input', data: '\t' }));
      } else if (btn.dataset.seq) {
        ws.send(JSON.stringify({ type: 'input', data: btn.dataset.seq }));
      } else if (btn.dataset.char) {
        ws.send(JSON.stringify({ type: 'input', data: btn.dataset.char }));
      }

      term.focus();
    });

    // Prevent quick key buttons from stealing focus
    document.getElementById('quick-keys').addEventListener('mousedown', (e) => {
      e.preventDefault();
    });
    document.getElementById('quick-keys').addEventListener('touchstart', (e) => {
      if (e.target.closest('.qk')) e.preventDefault();
    }, { passive: false });

    // --- Logout ---
    document.getElementById('logout-btn').addEventListener('click', () => {
      if (confirm('Disconnettersi?')) {
        sessionStorage.removeItem('token');
        token = null;
        if (ws) ws.close();
        location.reload();
      }
    });

    // --- Auto-login if token exists ---
    (async () => {
      if (token) {
        try {
          const res = await fetch('/api/check', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            showTerminal();
            return;
          }
        } catch(e) {}
        sessionStorage.removeItem('token');
        token = null;
      }
      // Focus password field
      document.getElementById('password').focus();
    })();
  </script>
</body>
</html>
