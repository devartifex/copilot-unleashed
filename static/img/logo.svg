<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fde047" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect width="512" height="512" rx="112" fill="url(#grid)" />
  <rect width="510" height="510" x="1" y="1" rx="111" fill="none" stroke="#3f3f46" stroke-width="2" />

  <path d="M 260 126 L 110 256 L 260 386"
        fill="none"
        stroke="url(#bracketGrad)"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <path d="M 180 166
           Q 180 256 460 140
           Q 180 256 180 346
           Q 180 256 110 256
           Q 180 256 180 166 Z"
        fill="url(#sparkGrad)"
        filter="url(#glow)" />

  <path d="M 410 75 Q 410 90 425 90 Q 410 90 410 105 Q 410 90 395 90 Q 410 90 410 75 Z"
        fill="#fde047" />

  <path d="M 460 190 Q 460 200 470 200 Q 460 200 460 210 Q 460 200 450 200 Q 460 200 460 190 Z"
        fill="#f97316" />

  <path d="M 320 358 Q 320 370 332 370 Q 320 370 320 382 Q 320 370 308 370 Q 320 370 320 358 Z"
        fill="#818cf8" />
</svg>
